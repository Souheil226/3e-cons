<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>3E Consulting — Bewerber Assistent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2017;--navy2:#0a1a0f;--accent:#d97706;--accent-h:#b45309;
  --bright:#4ade80;--white:#fff;--muted:#86a38e;
  --border:rgba(74,222,128,.15);--glass:rgba(255,255,255,.04);
  --chat-bg:#0d1f13;--user-bubble:#d97706;--bot-bubble:rgba(255,255,255,.06);
  --input-bg:rgba(255,255,255,.05);
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
  --topbar-h:60px;
  --inputbar-h:80px;
}

/* ── BASE ── */
html { height: 100%; }
body {
  height: 100%;
  font-family: var(--font-b);
  background: var(--navy);
  color: var(--white);
  overflow: hidden;      /* desktop: no scroll */
}

/* ── TOP BAR ── */
/* ── TOP BAR — Premium redesign ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem 0 1.1rem;
  background:rgba(10,26,15,.96);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(74,222,128,.1);
}
/* left: logo */
.top-brand{
  display:flex;align-items:center;gap:.55rem;text-decoration:none;flex-shrink:0;
}
.top-brand img{
  height:30px;width:30px;border-radius:7px;object-fit:cover;
  border:1px solid rgba(74,222,128,.2);
}
.top-brand-text{display:flex;flex-direction:column;line-height:1.1;}
.top-brand-name{
  font-family:var(--font-d);font-size:.9rem;font-weight:800;
  color:#fff;letter-spacing:.04em;
}
.top-brand-tag{
  font-size:.6rem;font-weight:600;letter-spacing:.08em;
  color:rgba(74,222,128,.6);text-transform:uppercase;
}
/* right: actions */
.top-actions{display:flex;align-items:center;gap:.5rem;}

/* ── LANGUAGE DROPDOWN ── */
.lang-dropdown{position:relative;}
.lang-trigger{
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.38rem .7rem .38rem .65rem;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.75);
  font-size:.78rem;font-weight:600;
  font-family:var(--font-b);cursor:pointer;
  transition:all .18s;white-space:nowrap;
  outline:none;
}
.lang-trigger:hover{
  border-color:rgba(217,119,6,.4);
  background:rgba(217,119,6,.08);
  color:#fff;
}
.lang-trigger .flag{font-size:.85rem;line-height:1;}
.lang-trigger .chevron{
  font-size:.65rem;color:rgba(255,255,255,.4);
  transition:transform .2s;margin-left:.1rem;
}
.lang-dropdown.open .lang-trigger{
  border-color:rgba(217,119,6,.5);
  background:rgba(217,119,6,.1);
  color:var(--accent);
}
.lang-dropdown.open .chevron{transform:rotate(180deg);}

.lang-menu{
  display:none;
  position:absolute;top:calc(100% + 8px);right:0;
  min-width:150px;
  background:#0f2017;
  border:1px solid rgba(74,222,128,.15);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  z-index:300;
}
.lang-dropdown.open .lang-menu{display:block;}
.lang-option{
  display:flex;align-items:center;gap:.65rem;
  padding:.6rem .9rem;
  font-size:.8rem;font-weight:500;
  color:rgba(255,255,255,.65);
  cursor:pointer;
  transition:background .15s,color .15s;
  font-family:var(--font-b);
  border:none;background:transparent;width:100%;text-align:left;
}
.lang-option:hover{background:rgba(217,119,6,.1);color:#fff;}
.lang-option.active{
  color:var(--accent);background:rgba(217,119,6,.08);
}
.lang-option .flag{font-size:.95rem;}
.lang-option .lang-name{flex:1;}
.lang-option .check{
  font-size:.7rem;color:var(--accent);
  opacity:0;transition:opacity .15s;
}
.lang-option.active .check{opacity:1;}

/* back button */
.top-back{
  display:inline-flex;align-items:center;gap:.35rem;
  font-size:.78rem;color:rgba(255,255,255,.45);
  text-decoration:none;
  padding:.38rem .65rem;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.08);
  background:transparent;
  transition:all .18s;white-space:nowrap;
}
.top-back:hover{
  color:rgba(255,255,255,.85);
  border-color:rgba(74,222,128,.25);
  background:rgba(74,222,128,.05);
}
.top-back i{font-size:.7rem;}
/* hide back label text on very small screens */
@media(max-width:380px){.top-back-label{display:none;}}

/* ── APP GRID ── */
.app{
  display:grid;
  grid-template-columns:280px 1fr;
  height:100vh;
  padding-top:var(--topbar-h);
}

/* ── SIDEBAR ── */
.sidebar{background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:1.25rem 1rem .75rem;border-bottom:1px solid var(--border);}
.sidebar-title{font-family:var(--font-d);font-size:.78rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.85rem;}
.new-chat-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.65rem;border-radius:10px;background:var(--accent);color:var(--white);border:none;cursor:pointer;font-size:.85rem;font-weight:600;font-family:var(--font-b);transition:background .2s,transform .15s;}
.new-chat-btn:hover{background:var(--accent-h);transform:translateY(-1px);}
.sidebar-section{padding:.75rem 1rem .25rem;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.topic-list{padding:0 .5rem;flex:1;overflow-y:auto;}
.topic-list::-webkit-scrollbar{width:3px;}
.topic-list::-webkit-scrollbar-thumb{background:rgba(74,222,128,.15);border-radius:2px;}
.topic-item{display:flex;align-items:center;gap:.65rem;padding:.6rem .75rem;border-radius:9px;cursor:pointer;transition:background .15s;margin-bottom:.2rem;}
.topic-item:hover,.topic-item.active{background:var(--glass);}
.topic-item.active{border-left:2px solid var(--accent);}
.topic-icon{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(217,119,6,.12);}
.topic-icon i{color:var(--accent);font-size:.8rem;}
.topic-label{font-size:.82rem;color:var(--muted);line-height:1.3;}
.topic-item.active .topic-label,.topic-item:hover .topic-label{color:var(--white);}

/* ── CHAT AREA ── */
.chat-area{
  display:flex;
  flex-direction:column;
  background:var(--chat-bg);
  overflow:hidden;
  position:relative;
}

/* ── WELCOME ── */
.welcome-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem 1.5rem;text-align:center;overflow-y:auto;
}
.welcome-icon{width:64px;height:64px;border-radius:18px;background:rgba(217,119,6,.15);border:1px solid rgba(217,119,6,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
.welcome-icon i{color:var(--accent);font-size:1.6rem;}
.welcome-title{font-family:var(--font-d);font-size:1.5rem;font-weight:800;margin-bottom:.5rem;}
.welcome-title em{font-style:normal;color:var(--accent);}
.welcome-sub{font-size:.9rem;color:var(--muted);line-height:1.6;max-width:400px;margin:0 auto 2rem;}
.suggest-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;width:100%;max-width:580px;margin:0 auto;}
.suggest-btn{display:flex;align-items:flex-start;gap:.6rem;padding:.8rem .9rem;border-radius:12px;border:1px solid var(--border);background:var(--glass);cursor:pointer;text-align:left;transition:border-color .2s,background .2s,transform .15s;font-family:var(--font-b);}
.suggest-btn:hover{border-color:rgba(217,119,6,.4);background:rgba(217,119,6,.07);transform:translateY(-1px);}
.suggest-btn i{color:var(--accent);font-size:.85rem;margin-top:.1rem;flex-shrink:0;}
.suggest-btn span{font-size:.79rem;color:var(--muted);line-height:1.45;}
.suggest-btn:hover span{color:var(--white);}

/* ── MESSAGES ── */
.messages{
  flex:1;overflow-y:auto;
  padding:1.5rem 1.25rem;
  display:flex;flex-direction:column;gap:1.25rem;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;  /* smooth iOS scroll */
}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:rgba(74,222,128,.15);border-radius:2px;}

.msg-row{display:flex;align-items:flex-start;gap:.75rem;}
.msg-row.user{flex-direction:row-reverse;}
.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;}
.avatar.bot{background:rgba(217,119,6,.2);border:1px solid rgba(217,119,6,.3);color:var(--accent);}
.avatar.user{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.25);color:var(--bright);}
.bubble{max-width:72%;padding:.85rem 1.1rem;border-radius:14px;font-size:.875rem;line-height:1.65;}
.bubble.bot{background:var(--bot-bubble);border:1px solid var(--border);border-top-left-radius:4px;color:var(--white);}
.bubble.user{background:var(--user-bubble);color:var(--white);border-top-right-radius:4px;}
.bubble p{margin-bottom:.55rem;}
.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:var(--bright);font-weight:600;}
.bubble a{color:var(--accent);text-decoration:underline;}
.link-btns{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem;}
.link-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem .9rem;border-radius:8px;background:rgba(217,119,6,.15);border:1px solid rgba(217,119,6,.35);color:var(--accent);font-size:.77rem;font-weight:600;text-decoration:none;cursor:pointer;transition:background .2s,transform .15s;font-family:var(--font-b);}
.link-btn:hover{background:rgba(217,119,6,.28);transform:translateY(-1px);}

/* book btn */
.book-btn{display:inline-flex;align-items:center;gap:.55rem;padding:.6rem 1.4rem;border-radius:12px;background:#d97706;color:#fff !important;font-size:.82rem;font-weight:700;letter-spacing:.03em;text-decoration:none !important;font-family:var(--font-b);border:none;position:relative;overflow:hidden;box-shadow:0 4px 15px rgba(217,119,6,.4),inset 0 1px 0 rgba(255,255,255,.15);transition:transform .18s,box-shadow .18s,background .18s;margin-top:.55rem;}
.book-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%);border-radius:inherit;}
.book-btn:hover{background:#b45309;box-shadow:0 6px 22px rgba(217,119,6,.55);transform:translateY(-2px);color:#fff !important;}
.book-btn .btn-icon{width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;}
.book-btn .btn-text{display:flex;flex-direction:column;line-height:1.1;}
.book-btn .btn-text span:first-child{font-size:.8rem;font-weight:700;}
.book-btn .btn-text small{font-size:.66rem;font-weight:400;opacity:.85;}

.price-badge{display:inline-flex;align-items:center;gap:.3rem;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:#4ade80;padding:.25rem .7rem;border-radius:999px;font-size:.75rem;font-weight:700;letter-spacing:.02em;margin:.45rem 0;font-family:var(--font-b);}
.sector-btns{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem;}
.sector-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem .9rem;border-radius:8px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);color:var(--bright);font-size:.77rem;font-weight:600;cursor:pointer;transition:background .2s,transform .15s;font-family:var(--font-b);border:none;}
.sector-btn:hover{background:rgba(74,222,128,.18);transform:translateY(-1px);}

/* typing dots */
.typing-dots{display:flex;gap:4px;align-items:center;padding:.2rem 0;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ════════════════════════════════════════
   INPUT BAR — FIXED STABLE BOTTOM
   ════════════════════════════════════════ */
.quick-chips{
  display:flex;gap:.45rem;flex-wrap:wrap;
  padding:.6rem 1.25rem .2rem;
  flex-shrink:0;
}
.chip{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .75rem;border-radius:999px;border:1px solid var(--border);background:transparent;font-size:.72rem;color:var(--muted);cursor:pointer;font-family:var(--font-b);transition:all .15s;}
.chip:hover{border-color:rgba(217,119,6,.35);color:var(--accent);background:rgba(217,119,6,.07);}

.input-bar{
  flex-shrink:0;               /* never compress */
  padding:.85rem 1.25rem 1rem;
  border-top:1px solid var(--border);
  background:rgba(13,31,19,.98);
}
.input-wrap{
  display:flex;align-items:flex-end;gap:.65rem;
  background:var(--input-bg);
  border:1px solid var(--border);
  border-radius:14px;
  padding:.65rem .75rem;
  transition:border-color .2s;
}
.input-wrap:focus-within{border-color:rgba(217,119,6,.45);}
#userInput{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--white);font-size:.9rem;
  font-family:var(--font-b);resize:none;line-height:1.5;
  max-height:120px;scrollbar-width:none;
  /* CRITICAL: prevent iOS zoom on focus */
  font-size:16px !important;
}
#userInput::placeholder{color:var(--muted);font-size:14px;}
#userInput::-webkit-scrollbar{display:none;}
.send-btn{width:36px;height:36px;border-radius:9px;flex-shrink:0;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s;}
.send-btn:hover{background:var(--accent-h);transform:scale(1.05);}
.send-btn i{color:#fff;font-size:.9rem;}
.send-btn:disabled{background:rgba(217,119,6,.25);cursor:not-allowed;transform:none;}
.input-hint{text-align:center;font-size:.72rem;color:rgba(134,163,142,.5);margin-top:.5rem;}

/* mobile header strip */
.mob-header{display:none;}

/* ════════════════════════════════════════
   RESPONSIVE — MOBILE
   ════════════════════════════════════════ */
@media(max-width:768px){

  /* Let body scroll naturally so keyboard pushes content up */
  html, body {
    height: 100%;
    overflow: hidden;
  }

  .app {
    grid-template-columns: 1fr;
    /* Use dvh (dynamic viewport height) — shrinks when keyboard opens */
    height: 100dvh;
    height: -webkit-fill-available; /* Safari fallback */
  }

  .sidebar { display: none; }

  /* Mobile top strip inside chat */
  .mob-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:.6rem 1rem;
    border-bottom:1px solid var(--border);
    background:rgba(13,31,19,.95);
    flex-shrink:0;
  }
  .mob-title{font-family:var(--font-d);font-size:.85rem;font-weight:700;}
  .mob-sidebar-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;}

  /* Chat area fills remaining space, input stays at bottom */
  .chat-area {
    height: 100dvh;
    height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    /* This is the key: when keyboard opens, the container shrinks
       and input-bar stays glued to the new bottom */
    position: relative;
  }

  .welcome-screen {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    /* Extra bottom padding so last message isn't hidden behind input */
    padding-bottom: 1rem;
  }

  /* Input bar: flex-shrink:0 already set globally,
     this ensures it's always visible above keyboard */
  .input-bar {
    flex-shrink: 0;
    /* Safe area for notch/home bar on iPhone */
    padding-bottom: calc(.85rem + env(safe-area-inset-bottom));
  }

  .quick-chips {
    flex-shrink: 0;
    overflow-x: auto;
    flex-wrap: nowrap;
    padding: .5rem 1rem .2rem;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .quick-chips::-webkit-scrollbar { display: none; }

  .bubble { max-width: 88%; }
  .suggest-grid { grid-template-columns: 1fr; }

  /* Sidebar overlay (mobile) */
  .sidebar.mob-open{
    display:flex;position:fixed;left:0;top:60px;bottom:0;
    width:280px;z-index:200;
  }
  .mob-overlay{display:none;position:fixed;inset:0;top:60px;background:rgba(0,0,0,.5);z-index:199;}
  .mob-overlay.show{display:block;}
}

@media(max-width:480px){
  .welcome-title { font-size:1.2rem; }
  .suggest-grid { gap:.5rem; }
  .top-bar { padding:0 .75rem; }
}
</style>
</head>
<body>
<header class="top-bar">
  <!-- Logo -->
  <a class="top-brand" href="index.html">
    <img src="logo_3e.jpg" alt="3E Consulting">
    <div class="top-brand-text">
      <span class="top-brand-name">3E Consulting</span>
      <span class="top-brand-tag">Bewerber Assistent</span>
    </div>
  </a>

  <!-- Right actions -->
  <div class="top-actions">

    <!-- Language dropdown -->
    <div class="lang-dropdown" id="langDropdown">
      <button class="lang-trigger" id="langTrigger" onclick="toggleLangMenu()" aria-haspopup="listbox" aria-expanded="false">
        <span class="flag" id="langFlag">🇩🇪</span>
        <span id="langCode">DE</span>
        <i class="fa-solid fa-chevron-down chevron"></i>
      </button>
      <div class="lang-menu" role="listbox" id="langMenu">
        <button class="lang-option active" id="opt-de" onclick="selectLang('de')" role="option">
          <span class="flag">🇩🇪</span>
          <span class="lang-name">Deutsch</span>
          <i class="fa-solid fa-check check"></i>
        </button>
        <button class="lang-option" id="opt-en" onclick="selectLang('en')" role="option">
          <span class="flag">🇬🇧</span>
          <span class="lang-name">English</span>
          <i class="fa-solid fa-check check"></i>
        </button>
        <button class="lang-option" id="opt-ar" onclick="selectLang('ar')" role="option">
          <span class="flag">🇩🇿</span>
          <span class="lang-name">العربية</span>
          <i class="fa-solid fa-check check"></i>
        </button>
      </div>
    </div>

    <!-- Back button -->
    <a class="top-back" href="index.html">
      <i class="fa-solid fa-arrow-left"></i>
      <span class="top-back-label" id="backLabel">Zurück</span>
    </a>

  </div>
</header>
<div class="mob-overlay" id="mobOverlay" onclick="closeSidebar()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title" id="sideTitle">Themen</div>
      <button class="new-chat-btn" onclick="resetChat()">
        <i class="fa-solid fa-plus"></i><span id="newChatLabel">Neues Gespräch</span>
      </button>
    </div>
    <div class="sidebar-section" id="sideQuickLabel">Schnellzugriff</div>
    <div class="topic-list" id="topicList"></div>
  </aside>
  <div class="chat-area">
    <div class="mob-header">
      <button class="mob-sidebar-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <span class="mob-title" id="mobTitle">Bewerber Assistent</span>
      <button class="mob-sidebar-btn" onclick="resetChat()"><i class="fa-solid fa-rotate-left"></i></button>
    </div>
    <div id="welcomeScreen" class="welcome-screen">
      <div class="welcome-icon"><i class="fa-solid fa-robot"></i></div>
      <h1 class="welcome-title" id="welcomeTitle">Hallo! Ich bin Ihr <em>Assistent</em></h1>
      <p class="welcome-sub" id="welcomeSub">Stellen Sie mir eine Frage oder wählen Sie ein Thema.</p>
      <div class="suggest-grid" id="suggestGrid"></div>
    </div>
    <div id="messages" class="messages" style="display:none;"></div>
    <div class="quick-chips" id="quickChips"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="userInput" rows="1" placeholder="Stellen Sie mir eine Frage..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
      <div class="input-hint" id="inputHint">Enter zum Senden · Shift+Enter für neue Zeile</div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════
   MOBILE KEYBOARD FIX
   Scroll messages to bottom when keyboard opens/closes
══════════════════════════════════ */
(function(){

let waitingForSector = false;

function detectSectorFromText(text){
  const t=text.toLowerCase();
  const map={
    pflege:['pflege','krankenpflege','altenpflege','nurse','nursing','تمريض','رعاية','صحة'],
    handwerk:['handwerk','elektriker','klempner','maler','schreiner','craft','trade','حرفة','كهربائي','نجار'],
    gastronomie:['gastro','restaurant','hotel','küche','koch','hospitality','ضيافة','فندق','مطبخ'],
    logistik:['logistik','transport','lkw','fahrer','lager','logistics','driver','لوجستيك','نقل','سائق'],
    it:['it','informatik','software','developer','تقنية','برمجة'],
    medizin_arzt:['arzt','zahnarzt','doktor','doctor','dentist','طبيب'],
    architektur:['architekt','architecture','هندسة معمارية'],
    buchhaltung:['buchhalter','finanzen','accountant','محاسبة'],
  };
  for(const [key,words] of Object.entries(map)){if(words.some(w=>t.includes(w)))return key;}
  return null;
}

function handleJobSectorResponse(sectorKey){
  waitingForSector=false;
  const sector=SECTORS[sectorKey];
  if(!sector){
    const msg={de:`<p>Dieses Berufsfeld ist nicht verfügbar. Verfügbar: Pflege, Handwerk, Gastronomie, Logistik.</p>`,en:`<p>This field is not available. Available: Healthcare, Trades, Hospitality, Logistics.</p>`,ar:`<p>هذا المجال غير متاح. المتاح: تمريض، حرف، ضيافة، لوجستيك.</p>`};
    addMessage('bot',msg[currentLang]); return;
  }
  if(!sector.available){
    const msg={de:`<p><strong>${sector.label.de}</strong> ist derzeit nicht verfügbar.</p><p>Verfügbar: 🏥 Pflege · 🔧 Handwerk · 🍽️ Gastronomie · 🚛 Logistik</p>`,en:`<p><strong>${sector.label.en}</strong> is not available.</p>`,ar:`<p><strong>${sector.label.ar}</strong> غير متاح حالياً.</p>`};
    addMessage('bot',msg[currentLang]); return;
  }
  addMessage('bot',sector.conditions[currentLang],sector.pages);
}

function askForSector(){
  waitingForSector=true;
  const sectorList=Object.entries(SECTORS).map(([key,s])=>`<button class="sector-btn" onclick="pickSector('${key}')">${s.icon} ${s.label[currentLang]}</button>`).join('');
  const msg={de:`<p>In welchem <strong>Berufsfeld</strong> suchen Sie?</p><div class="sector-btns">${sectorList}</div>`,en:`<p>Which <strong>field</strong> are you looking for?</p><div class="sector-btns">${sectorList}</div>`,ar:`<p>في أي <strong>مجال</strong> تبحث؟</p><div class="sector-btns">${sectorList}</div>`};
  addMessage('bot',msg[currentLang]);
}

function pickSector(key){
  const sector=SECTORS[key];
  if(!sector)return;
  addMessage('user',`<p>${sector.icon} ${sector.label[currentLang]}</p>`);
  handleJobSectorResponse(key);
}

  kontakt:{de:{text:`<p>📧 <a href="mailto:merabtisouheil@gmail.com">merabtisouheil@gmail.com</a></p>`,links:[{label:'📬 Kontakt',url:'index.html#contact'}]},en:{text:`<p>📧 <a href="mailto:merabtisouheil@gmail.com">merabtisouheil@gmail.com</a></p>`,links:[]},ar:{text:`<p>📧 <a href="mailto:merabtisouheil@gmail.com">merabtisouheil@gmail.com</a></p>`,links:[]}}
};

const FALLBACK={de:`<p>Ich habe Ihre Frage nicht verstanden. Wählen Sie ein Thema links.</p>`,en:`<p>I didn't understand. Please choose a topic.</p>`,ar:`<p>لم أفهم. الرجاء اختيار موضوع.</p>`};

/* KEYWORDS */
const KEYWORDS={
  cv:['lebenslauf','cv','resume','سيرة'],
  motivation:['motivat','anschreiben','letter','رسالة'],
  docs:['dokument','unterlag','وثيق','zeugnis'],
  ausbildung:['ausbildung','apprenti','تدريب','voraussetz'],
  job:['job','stelle','arbeit','work','عمل','وظيفة'],
  interview:['interview','gespräch','مقابلة'],
  video:['video','فيديو'],
  visum:['visum','visa','تأشيرة'],
  kosten:['kost','preis','price','cost','تكلف','تكاليف'],
  chancen:['chance','فرص'],
  sperrkonto:['sperrkonto','blocked','حساب مقيد'],
  schritte:['erste','ankunft','خطوات','bank','kranken'],
  register:['registrierung','register','konto','account','حساب'],
  kontakt:['kontakt','contact','support','تواصل']
};

function detectTopic(text){
  const t=text.toLowerCase();
  for(const [key,words] of Object.entries(KEYWORDS)){if(words.some(w=>t.includes(w)))return key;}
  return null;
}

const SYSTEM_PROMPT=`You are the official AI assistant of 3E-Consulting, connecting Algerian candidates with German employers.
RULES: Short, clear, professional answers. Max 150 words. Use HTML: <p>, <strong>, <br>, <a href="...">label</a>. Detect language → reply in SAME language.
SECTORS: Pflege (B2), Handwerk (B1), Gastronomie (B1), Logistik (B1). NOT available: IT, Arzt, Architektur, Buchhaltung.
PRICING: Registration FREE | CV 4,500 DA | Motivation 7,500 DA | Interview 12,000 DA.`;

/* STATE */
let chatStarted=false, isTyping=false, conversationHistory=[];

function renderSidebar(){document.getElementById('topicList').innerHTML=TOPICS[currentLang].map(t=>`<div class="topic-item" onclick="askTopic('${t.key}')"><div class="topic-icon"><i class="fa-solid ${t.icon}"></i></div><span class="topic-label">${t.label}</span></div>`).join('');}
function renderSuggests(){document.getElementById('suggestGrid').innerHTML=SUGGESTS[currentLang].map(s=>`<button class="suggest-btn" onclick="askTopic('${s.key}')"><i class="fa-solid ${s.icon}"></i><span>${s.text}</span></button>`).join('');}
function renderChips(){document.getElementById('quickChips').innerHTML=CHIPS[currentLang].map(c=>`<button class="chip" onclick="sendChip('${c}')">${c}</button>`).join('');}
function applyLangUI(){const L=LANGS[currentLang];document.getElementById('backLabel').textContent=L.back;document.getElementById('newChatLabel').textContent=L.newChat;document.getElementById('sideTitle').textContent=L.sideTitle;document.getElementById('sideQuickLabel').textContent=L.sideQuickLabel;document.getElementById('mobTitle').textContent=L.mobTitle;document.getElementById('welcomeTitle').innerHTML=L.welcomeTitle;document.getElementById('welcomeSub').textContent=L.welcomeSub;document.getElementById('userInput').placeholder=L.placeholder;document.getElementById('inputHint').textContent=L.inputHint;document.body.style.direction=currentLang==='ar'?'rtl':'ltr';}

function startChat(){if(!chatStarted){chatStarted=true;document.getElementById('welcomeScreen').style.display='none';document.getElementById('messages').style.display='flex';}}

function addMessage(role,html,links){
  startChat();
  const msgs=document.getElementById('messages');
  const isBot=role==='bot';
  const row=document.createElement('div');
  row.className=`msg-row ${role}`;
  const av=`<div class="avatar ${role}">${isBot?'<i class="fa-solid fa-robot" style="font-size:.75rem"></i>':'<i class="fa-solid fa-user" style="font-size:.75rem"></i>'}</div>`;
  let linksHtml='';
  if(links&&links.length){linksHtml=`<div class="link-btns">${links.map(l=>`<a class="link-btn" href="${l.url}"><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:.65rem"></i>${l.label}</a>`).join('')}</div>`;}
  const bubble=`<div class="bubble ${role}">${html}${linksHtml}</div>`;
  row.innerHTML=isBot?av+bubble:bubble+av;
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){startChat();const msgs=document.getElementById('messages');const row=document.createElement('div');row.className='msg-row bot';row.id='typingRow';row.innerHTML=`<div class="avatar bot"><i class="fa-solid fa-robot" style="font-size:.75rem"></i></div><div class="bubble bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;}
function removeTyping(){const el=document.getElementById('typingRow');if(el)el.remove();}

function askTopic(key){
  const q=SUGGESTS[currentLang].find(s=>s.key===key);
  const label=q?q.text:(TOPICS[currentLang].find(t=>t.key===key)?.label||key);
  addMessage('user',`<p>${label}</p>`);
  if(key==='job'){askForSector();closeSidebar();return;}
  respond(key,label);
  closeSidebar();
}

function sendChip(text){document.getElementById('userInput').value=text;sendMessage();}

function sendMessage(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();
  if(!text||isTyping)return;
  input.value='';input.style.height='auto';
  addMessage('user',`<p>${escapeHtml(text)}</p>`);
  if(waitingForSector){
    const sectorKey=detectSectorFromText(text);
    if(sectorKey){handleJobSectorResponse(sectorKey);return;}
    const msg={de:`<p>Bitte wählen Sie einen Sektor:</p>`,en:`<p>Please pick a field:</p>`,ar:`<p>الرجاء اختيار المجال:</p>`};
    addMessage('bot',msg[currentLang]);
    askForSector();return;
  }
  const topic=detectTopic(text);
  if(topic==='job'){askForSector();return;}
  respond(topic,text);
}

async function respond(key,userText){
  if(isTyping)return;
  isTyping=true;
  document.getElementById('sendBtn').disabled=true;
  showTyping();
  const msgText=userText||(TOPICS[currentLang].find(t=>t.key===key)?.label)||key||'Hello';
  conversationHistory.push({role:'user',content:msgText});
  try{
    const res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:SYSTEM_PROMPT,messages:conversationHistory})});
    const data=await res.json();
    removeTyping();
    if(data.content&&data.content[0]&&data.content[0].text){
      const aiText=data.content[0].text;
      conversationHistory.push({role:'assistant',content:aiText});
      const staticLinks=(key&&RESPONSES[key])?RESPONSES[key][currentLang]?.links:null;
      addMessage('bot',aiText,staticLinks);
    }else throw new Error('no content');
  }catch(err){
    removeTyping();
    const resp=key&&RESPONSES[key]?RESPONSES[key][currentLang]:null;
    if(resp)addMessage('bot',resp.text,resp.links);
    else addMessage('bot',FALLBACK[currentLang]);
  }
  isTyping=false;
  document.getElementById('sendBtn').disabled=false;
}

function resetChat(){chatStarted=false;conversationHistory=[];waitingForSector=false;document.getElementById('welcomeScreen').style.display='flex';document.getElementById('messages').style.display='none';document.getElementById('messages').innerHTML='';document.getElementById('userInput').value='';closeSidebar();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
/* ── Language dropdown logic ── */
const LANG_META={
  de:{flag:'🇩🇪',code:'DE'},
  en:{flag:'🇬🇧',code:'EN'},
  ar:{flag:'🇩🇿',code:'AR'}
};
function toggleLangMenu(){
  const dd=document.getElementById('langDropdown');
  const open=dd.classList.toggle('open');
  document.getElementById('langTrigger').setAttribute('aria-expanded',open);
}
function selectLang(lang){
  const dd=document.getElementById('langDropdown');
  dd.classList.remove('open');
  document.getElementById('langTrigger').setAttribute('aria-expanded','false');
  document.getElementById('langFlag').textContent=LANG_META[lang].flag;
  document.getElementById('langCode').textContent=LANG_META[lang].code;
  ['de','en','ar'].forEach(l=>{
    document.getElementById('opt-'+l).classList.toggle('active',l===lang);
  });
  setLang(lang);
}
document.addEventListener('click',function(e){
  const dd=document.getElementById('langDropdown');
  if(dd&&!dd.contains(e.target)) dd.classList.remove('open');
});
function setLang(lang){currentLang=lang;applyLangUI();renderSidebar();renderSuggests();renderChips();}
function toggleSidebar(){const s=document.getElementById('sidebar'),o=document.getElementById('mobOverlay'),open=s.classList.toggle('mob-open');o.classList.toggle('show',open);}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mob-open');document.getElementById('mobOverlay').classList.remove('show');}

setLang('de');
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
