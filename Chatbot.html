<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>3E Consulting — Bewerber Assistent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2017;--navy2:#0a1a0f;--accent:#d97706;--accent-h:#b45309;
  --bright:#4ade80;--white:#fff;--muted:#86a38e;
  --border:rgba(74,222,128,.15);--glass:rgba(255,255,255,.04);
  --chat-bg:#0d1f13;--user-bubble:#d97706;--bot-bubble:rgba(255,255,255,.06);
  --input-bg:rgba(255,255,255,.05);
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
  --topbar-h:56px;--inputbar-h:72px;
}

/* ── THEME LIGHT ── */
body.light-mode{
  --navy:#f0f7f1;
  --navy2:#e4f0e6;
  --chat-bg:#f7faf7;
  --white:#0f1f13;
  --muted:#3d6147;
  --border:rgba(22,101,52,.18);
  --glass:rgba(34,197,94,.06);
  --bot-bubble:rgba(34,197,94,.07);
  --input-bg:rgba(22,101,52,.06);
  --user-bubble:#d97706;
  background:#f0f7f1;
  color:#0f1f13;
}

/* Top bar — light */
body.light-mode .top-bar{
  background:rgba(228,240,230,.98);
  border-bottom:1px solid rgba(22,101,52,.14);
}
body.light-mode .top-brand-name{color:#0f1f13;}
body.light-mode .top-brand-tag{color:rgba(22,101,52,.6);}

/* Sidebar — light */
body.light-mode .sidebar{
  background:#dceede;
  border-right:1px solid rgba(22,101,52,.14);
}
body.light-mode .sidebar-title{color:#3d6147;}
body.light-mode .new-chat-btn{background:var(--accent);color:#fff;}
body.light-mode .topic-item:hover,
body.light-mode .topic-item.active{background:rgba(34,197,94,.12);}
body.light-mode .topic-label{color:#2d5238;}
body.light-mode .topic-item:hover .topic-label,
body.light-mode .topic-item.active .topic-label{color:#0f1f13;}
body.light-mode .msgs-left-bar{background:rgba(22,101,52,.12);}

/* Mobile header — light */
body.light-mode .mob-header{
  background:rgba(228,240,230,.97);
  border-bottom:1px solid rgba(22,101,52,.14);
}
body.light-mode .mob-title{color:#0f1f13;}
body.light-mode .mob-sidebar-btn{
  border-color:rgba(22,101,52,.2);
  color:#3d6147;
  background:rgba(34,197,94,.06);
}

/* Welcome screen — light */
body.light-mode .welcome-screen{background:#f7faf7;}
body.light-mode .welcome-title{color:#0f1f13;}
body.light-mode .welcome-sub{color:#3d6147;}

/* SUGGEST BUTTONS — light (the main fix!) */
body.light-mode .suggest-btn{
  background:#ffffff;
  border:1.5px solid rgba(22,101,52,.2);
  box-shadow:0 1px 4px rgba(22,101,52,.08);
}
body.light-mode .suggest-btn:hover{
  background:#f0fdf4;
  border-color:rgba(22,101,52,.45);
  box-shadow:0 3px 10px rgba(22,101,52,.12);
  transform:translateY(-1px);
}
body.light-mode .suggest-btn span{
  color:#2d5238;
}
body.light-mode .suggest-btn:hover span{color:#0f1f13;}
body.light-mode .suggest-btn i{color:var(--accent);}

/* Chat messages — light */
body.light-mode .messages{background:#f7faf7;}
body.light-mode .bubble.user{
  background:var(--accent);
  color:#fff;
}
body.light-mode .bubble.bot{
  background:#ffffff;
  border:1.5px solid rgba(22,101,52,.15);
  color:#0f1f13;
  box-shadow:0 1px 4px rgba(22,101,52,.06);
}
body.light-mode .bubble.bot strong{color:#059669;}
body.light-mode .bubble.bot a{color:var(--accent);}

/* Avatar — light */
body.light-mode .avatar.bot{
  background:rgba(217,119,6,.12);
  border-color:rgba(217,119,6,.25);
  color:var(--accent);
}
body.light-mode .avatar.user{
  background:rgba(22,101,52,.1);
  border-color:rgba(22,101,52,.2);
  color:#16a34a;
}

/* Rating widget — light */
body.light-mode .rating-widget{
  background:rgba(22,101,52,.05);
  border-color:rgba(22,101,52,.12);
}
body.light-mode .rating-q{color:#3d6147;}
body.light-mode .rating-btn{
  border-color:rgba(22,101,52,.18);
  background:#fff;
}

/* Follow-up chips — light */
body.light-mode .follow-up-btn{
  background:#fff;
  border-color:rgba(22,101,52,.2);
  color:#2d5238;
}
body.light-mode .follow-up-btn:hover{
  background:#f0fdf4;
  border-color:rgba(22,101,52,.4);
  color:#0f1f13;
}

/* WA card — light */
body.light-mode .wa-card{
  background:#fff;
  border-color:rgba(22,101,52,.15);
}
body.light-mode .wa-card-name{color:#0f1f13;}
body.light-mode .wa-card-sub{color:#3d6147;}

/* Quick chips — light */
body.light-mode .chip{
  background:#fff;
  border-color:rgba(22,101,52,.18);
  color:#2d5238;
  box-shadow:0 1px 3px rgba(22,101,52,.06);
}
body.light-mode .chip:hover{
  border-color:rgba(217,119,6,.4);
  color:var(--accent);
  background:#fffbeb;
}

/* Input area — light */
body.light-mode .input-bar{
  background:rgba(228,240,230,.99);
  border-top:1px solid rgba(22,101,52,.14);
}
body.light-mode .input-wrap{
  background:#fff;
  border-color:rgba(22,101,52,.2);
  box-shadow:0 1px 4px rgba(22,101,52,.06);
}
body.light-mode .input-wrap:focus-within{
  border-color:rgba(217,119,6,.5);
  box-shadow:0 0 0 3px rgba(217,119,6,.08);
}
body.light-mode #userInput{color:#0f1f13;}
body.light-mode #userInput::placeholder{color:#3d6147;}
body.light-mode .input-hint{color:rgba(61,97,71,.5);}
body.light-mode .mic-btn{
  background:rgba(22,101,52,.06);
  border-color:rgba(22,101,52,.15);
  color:#3d6147;
}
body.light-mode .mic-btn:hover{
  background:rgba(217,119,6,.1);
  border-color:rgba(217,119,6,.3);
  color:var(--accent);
}

/* Language dropdown — light */
body.light-mode .lang-trigger{
  border-color:rgba(22,101,52,.2);
  background:rgba(22,101,52,.06);
  color:#2d5238;
}
body.light-mode .lang-trigger:hover{
  border-color:rgba(217,119,6,.4);
  background:rgba(217,119,6,.08);
  color:var(--accent);
}
body.light-mode .lang-menu{
  background:#f0f7f1;
  border-color:rgba(22,101,52,.2);
  box-shadow:0 8px 24px rgba(22,101,52,.12);
}
body.light-mode .lang-option{color:#2d5238;}
body.light-mode .lang-option:hover{background:rgba(217,119,6,.08);color:#0f1f13;}
body.light-mode .lang-option.active{color:var(--accent);}

/* Theme & nav buttons — light */
body.light-mode .theme-btn{
  border-color:rgba(22,101,52,.2);
  background:rgba(22,101,52,.06);
  color:#2d5238;
}
body.light-mode .theme-btn:hover{
  border-color:rgba(217,119,6,.35);
  background:rgba(217,119,6,.08);
  color:var(--accent);
}
body.light-mode .top-back{
  border-color:rgba(22,101,52,.18);
  color:#3d6147;
}
body.light-mode .top-back:hover{
  border-color:rgba(22,101,52,.35);
  color:#0f1f13;
  background:rgba(22,101,52,.06);
}
body.light-mode .export-btn{
  border-color:rgba(22,101,52,.18);
  color:#3d6147;
}
body.light-mode .export-btn:hover{
  border-color:rgba(22,101,52,.3);
  color:#0f1f13;
}
body.light-mode .status-dot{
  border-color:rgba(22,101,52,.18);
  background:rgba(22,101,52,.05);
  color:#3d6147;
}

/* Scrollbar — light */
body.light-mode .topic-list::-webkit-scrollbar-thumb{background:rgba(22,101,52,.2);}
body.light-mode .messages::-webkit-scrollbar-thumb{background:rgba(22,101,52,.15);}

/* Typing dots — light */
body.light-mode .typing-dots span{background:#3d6147;}

/* Link buttons — light */
body.light-mode .link-btn{
  background:rgba(217,119,6,.1);
  border-color:rgba(217,119,6,.3);
  color:var(--accent);
}
body.light-mode .link-btn:hover{background:rgba(217,119,6,.2);}

/* Price badge — light */
body.light-mode .price-badge{
  background:rgba(22,101,52,.08);
  border-color:rgba(22,101,52,.25);
  color:#15803d;
}

/* Sector buttons — light */
body.light-mode .sector-btn{
  background:rgba(22,101,52,.08);
  border-color:rgba(22,101,52,.22);
  color:#15803d;
}
body.light-mode .sector-btn:hover{background:rgba(22,101,52,.16);}

/* Scroll button — light */
body.light-mode .scroll-btn{
  background:rgba(217,119,6,.88);
}

html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-b);background:var(--navy);color:var(--white);transition:background .3s,color .3s;}

/* ── TOP BAR ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 .85rem 0 .85rem;
  background:rgba(10,26,15,.97);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(74,222,128,.1);
  gap:.5rem;
}
.top-brand{display:flex;align-items:center;gap:.5rem;text-decoration:none;flex-shrink:0;min-width:0;}
.top-brand img{height:28px;width:28px;border-radius:7px;object-fit:cover;border:1px solid rgba(74,222,128,.2);flex-shrink:0;}
.top-brand-text{display:flex;flex-direction:column;line-height:1.1;min-width:0;}
.top-brand-name{font-family:var(--font-d);font-size:.82rem;font-weight:800;color:#fff;letter-spacing:.04em;white-space:nowrap;}
.top-brand-tag{font-size:.55rem;font-weight:600;letter-spacing:.08em;color:rgba(74,222,128,.6);text-transform:uppercase;}
.top-actions{display:flex;align-items:center;gap:.35rem;flex-shrink:0;}

/* ── STATUS INDICATOR ── */
.status-dot{display:inline-flex;align-items:center;gap:.3rem;font-size:.68rem;color:rgba(255,255,255,.5);padding:.25rem .55rem;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);white-space:nowrap;}
.status-dot .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0;}
.status-dot .dot.slow{background:#f59e0b;animation:blink 1.2s ease-in-out infinite;}
.status-dot .dot.offline{background:#ef4444;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.status-dot .slabel{display:none;}
@media(min-width:600px){.status-dot .slabel{display:inline;}}

/* ── THEME TOGGLE ── */
.theme-btn{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .2s;flex-shrink:0;}
.theme-btn:hover{border-color:rgba(217,119,6,.4);background:rgba(217,119,6,.08);color:#fff;}

/* ── LANGUAGE DROPDOWN ── */
.lang-dropdown{position:relative;}
.lang-trigger{display:inline-flex;align-items:center;gap:.3rem;padding:.32rem .6rem .32rem .55rem;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.75);font-size:.75rem;font-weight:600;font-family:var(--font-b);cursor:pointer;transition:all .18s;white-space:nowrap;outline:none;}
.lang-trigger:hover{border-color:rgba(217,119,6,.4);background:rgba(217,119,6,.08);color:#fff;}
.lang-trigger .flag{font-size:.8rem;line-height:1;}
.lang-trigger .chevron{font-size:.6rem;color:rgba(255,255,255,.4);transition:transform .2s;margin-left:.05rem;}
.lang-dropdown.open .lang-trigger{border-color:rgba(217,119,6,.5);background:rgba(217,119,6,.1);color:var(--accent);}
.lang-dropdown.open .chevron{transform:rotate(180deg);}
.lang-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:140px;background:#0f2017;border:1px solid rgba(74,222,128,.15);border-radius:10px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:400;}
.lang-dropdown.open .lang-menu{display:block;}
.lang-option{display:flex;align-items:center;gap:.6rem;padding:.55rem .85rem;font-size:.78rem;font-weight:500;color:rgba(255,255,255,.65);cursor:pointer;transition:background .15s,color .15s;font-family:var(--font-b);border:none;background:transparent;width:100%;text-align:left;}
.lang-option:hover{background:rgba(217,119,6,.1);color:#fff;}
.lang-option.active{color:var(--accent);background:rgba(217,119,6,.08);}
.lang-option .flag{font-size:.9rem;}
.lang-option .lang-name{flex:1;}
.lang-option .check{font-size:.68rem;color:var(--accent);opacity:0;transition:opacity .15s;}
.lang-option.active .check{opacity:1;}

/* back + export */
.top-back{display:inline-flex;align-items:center;gap:.3rem;font-size:.74rem;color:rgba(255,255,255,.45);text-decoration:none;padding:.32rem .6rem;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:transparent;transition:all .18s;white-space:nowrap;}
.top-back:hover{color:rgba(255,255,255,.85);border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.05);}
.top-back i{font-size:.68rem;}
.export-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.73rem;color:rgba(255,255,255,.5);padding:.32rem .6rem;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:transparent;cursor:pointer;font-family:var(--font-b);transition:all .18s;white-space:nowrap;}
.export-btn:hover{color:#fff;border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.06);}

/* Hide labels on very small screens */
@media(max-width:420px){.top-back-label,.export-label,.top-brand-tag{display:none;}}
@media(max-width:360px){.top-brand-name{font-size:.75rem;}}

/* ── APP LAYOUT ── */
.app{
  display:grid;
  grid-template-columns:260px 1fr;
  height:100dvh;
  padding-top:var(--topbar-h);
  overflow:hidden;
}

/* ── SIDEBAR ── */
.sidebar{background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:1rem .85rem .65rem;border-bottom:1px solid var(--border);}
.sidebar-title{font-family:var(--font-d);font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem;}
.new-chat-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.6rem;border-radius:10px;background:var(--accent);color:var(--white);border:none;cursor:pointer;font-size:.82rem;font-weight:600;font-family:var(--font-b);transition:background .2s,transform .15s;}
.new-chat-btn:hover{background:var(--accent-h);transform:translateY(-1px);}
.sidebar-section{padding:.65rem .85rem .2rem;font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.topic-list{padding:0 .4rem;flex:1;overflow-y:auto;}
.topic-list::-webkit-scrollbar{width:3px;}
.topic-list::-webkit-scrollbar-thumb{background:rgba(74,222,128,.15);border-radius:2px;}
.topic-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;border-radius:9px;cursor:pointer;transition:background .15s;margin-bottom:.18rem;}
.topic-item:hover,.topic-item.active{background:var(--glass);}
.topic-item.active{border-left:2px solid var(--accent);}
.topic-icon{width:26px;height:26px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(217,119,6,.12);}
.topic-icon i{color:var(--accent);font-size:.75rem;}
.topic-label{font-size:.8rem;color:var(--muted);line-height:1.3;}
.topic-item.active .topic-label,.topic-item:hover .topic-label{color:var(--white);}
.msgs-left-wrap{padding:.55rem .85rem;border-top:1px solid var(--border);font-size:.7rem;color:var(--muted);}
.msgs-left-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:4px;overflow:hidden;}
.msgs-left-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}

/* ── CHAT AREA ── */
.chat-area{
  display:flex;flex-direction:column;
  background:var(--chat-bg);
  overflow:hidden;position:relative;
  height:100%;
}

/* ── MOBILE HEADER (inside chat-area) ── */
.mob-header{
  display:none;
  align-items:center;justify-content:space-between;
  padding:.55rem .9rem;
  border-bottom:1px solid var(--border);
  background:rgba(13,31,19,.96);
  flex-shrink:0;
  min-height:44px;
}
.mob-title{font-family:var(--font-d);font-size:.82rem;font-weight:700;color:var(--white);}
.mob-sidebar-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;}

/* ── WELCOME SCREEN ── */
.welcome-screen{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:1.5rem 1rem 1rem;
  text-align:center;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.welcome-icon{width:56px;height:56px;border-radius:16px;background:rgba(217,119,6,.15);border:1px solid rgba(217,119,6,.3);display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;}
.welcome-icon i{color:var(--accent);font-size:1.4rem;}
.welcome-title{font-family:var(--font-d);font-size:1.25rem;font-weight:800;margin-bottom:.4rem;line-height:1.2;}
.welcome-title em{font-style:normal;color:var(--accent);}
.welcome-sub{font-size:.84rem;color:var(--muted);line-height:1.55;max-width:340px;margin:0 auto 1.25rem;}

/* ── SUGGEST GRID — FIXED MOBILE ── */
.suggest-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:.55rem;
  width:100%;
  max-width:520px;
  margin:0 auto;
}
.suggest-btn{
  display:flex;align-items:flex-start;gap:.55rem;
  padding:.7rem .8rem;
  border-radius:11px;
  border:1px solid var(--border);
  background:var(--glass);
  cursor:pointer;text-align:left;
  transition:border-color .2s,background .2s,transform .15s;
  font-family:var(--font-b);
  /* key fix: no transform on mobile to avoid layout jumps */
}
.suggest-btn:hover{border-color:rgba(217,119,6,.4);background:rgba(217,119,6,.07);transform:translateY(-1px);}
.suggest-btn:active{transform:scale(.97);}
.suggest-btn i{color:var(--accent);font-size:.82rem;margin-top:.12rem;flex-shrink:0;}
.suggest-btn span{font-size:.76rem;color:var(--muted);line-height:1.4;}
.suggest-btn:hover span{color:var(--white);}

/* ── MESSAGES ── */
.messages{flex:1;overflow-y:auto;padding:1.25rem 1rem;display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:rgba(74,222,128,.15);border-radius:2px;}
.msg-row{display:flex;align-items:flex-start;gap:.65rem;animation:msgIn .22s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{flex-direction:row-reverse;}
.avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;}
.avatar.bot{background:rgba(217,119,6,.2);border:1px solid rgba(217,119,6,.3);color:var(--accent);}
.avatar.user{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.25);color:var(--bright);}
.bubble{max-width:78%;padding:.75rem .95rem;border-radius:13px;font-size:.855rem;line-height:1.6;}
.bubble.bot{background:var(--bot-bubble);border:1px solid var(--border);border-top-left-radius:4px;color:var(--white);}
.bubble.user{background:var(--user-bubble);color:var(--white);border-top-right-radius:4px;}
.bubble p{margin-bottom:.5rem;}
.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:var(--bright);font-weight:600;}
.bubble a{color:var(--accent);text-decoration:underline;}
.link-btns{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.65rem;}
.link-btn{display:inline-flex;align-items:center;gap:.35rem;padding:.4rem .8rem;border-radius:8px;background:rgba(217,119,6,.15);border:1px solid rgba(217,119,6,.35);color:var(--accent);font-size:.74rem;font-weight:600;text-decoration:none;cursor:pointer;transition:background .2s,transform .15s;font-family:var(--font-b);}
.link-btn:hover{background:rgba(217,119,6,.28);transform:translateY(-1px);}
.book-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem 1.2rem;border-radius:11px;background:#d97706;color:#fff !important;font-size:.79rem;font-weight:700;letter-spacing:.03em;text-decoration:none !important;font-family:var(--font-b);border:none;position:relative;overflow:hidden;box-shadow:0 4px 14px rgba(217,119,6,.35),inset 0 1px 0 rgba(255,255,255,.15);transition:transform .18s,box-shadow .18s,background .18s;margin-top:.5rem;}
.book-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%);border-radius:inherit;}
.book-btn:hover{background:#b45309;box-shadow:0 6px 20px rgba(217,119,6,.5);transform:translateY(-2px);color:#fff !important;}
.book-btn .btn-icon{width:20px;height:20px;border-radius:6px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:.66rem;flex-shrink:0;}
.book-btn .btn-text{display:flex;flex-direction:column;line-height:1.1;}
.book-btn .btn-text span:first-child{font-size:.77rem;font-weight:700;}
.book-btn .btn-text small{font-size:.63rem;font-weight:400;opacity:.85;}
.price-badge{display:inline-flex;align-items:center;gap:.28rem;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:#4ade80;padding:.22rem .65rem;border-radius:999px;font-size:.72rem;font-weight:700;letter-spacing:.02em;margin:.4rem 0;font-family:var(--font-b);}
.sector-btns{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.65rem;}
.sector-btn{display:inline-flex;align-items:center;gap:.38rem;padding:.42rem .85rem;border-radius:8px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);color:var(--bright);font-size:.74rem;font-weight:600;cursor:pointer;transition:background .2s,transform .15s;font-family:var(--font-b);}
.sector-btn:hover{background:rgba(74,222,128,.18);transform:translateY(-1px);}

/* ── TYPING DOTS ── */
.typing-dots{display:flex;gap:4px;align-items:center;padding:.15rem 0;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── RATING ── */
.rating-widget{display:flex;align-items:center;gap:.55rem;margin-top:.75rem;padding:.5rem .7rem;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);}
.rating-q{font-size:.7rem;color:var(--muted);flex:1;}
.rating-btns{display:flex;gap:.35rem;}
.rating-btn{width:28px;height:28px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.82rem;transition:all .18s;}
.rating-btn.pos:hover,.rating-btn.pos.chosen{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.4);}
.rating-btn.neg:hover,.rating-btn.neg.chosen{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.35);}
.rating-btn:disabled{cursor:default;opacity:.5;}

/* ── FOLLOW-UP ── */
.followup-wrap{display:flex;flex-wrap:wrap;gap:.38rem;margin-top:.65rem;}
.followup-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.32rem .7rem;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);font-size:.7rem;font-weight:500;cursor:pointer;transition:all .18s;font-family:var(--font-b);}
.followup-btn:hover{border-color:rgba(217,119,6,.4);color:var(--accent);background:rgba(217,119,6,.07);}
.followup-btn i{font-size:.62rem;}

/* ── WHATSAPP CARD ── */
.wa-card{margin-top:.75rem;background:linear-gradient(135deg,rgba(37,211,102,.07),rgba(37,211,102,.02));border:1px solid rgba(37,211,102,.25);border-radius:12px;padding:.85rem .9rem;display:flex;flex-direction:column;gap:.65rem;}
.wa-card-top{display:flex;align-items:center;gap:.65rem;}
.wa-icon{width:36px;height:36px;border-radius:50%;background:rgba(37,211,102,.14);border:1px solid rgba(37,211,102,.28);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem;color:#25d366;}
.wa-card-title{font-size:.78rem;font-weight:700;color:var(--white);line-height:1.2;}
.wa-card-sub{font-size:.68rem;color:var(--muted);margin-top:2px;}
.wa-btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;background:#25d366;color:#fff !important;text-decoration:none !important;border-radius:9px;padding:.5rem .9rem;font-size:.77rem;font-weight:700;font-family:var(--font-b);transition:background .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 12px rgba(37,211,102,.2);}
.wa-btn:hover{background:#1da851;transform:translateY(-1px);}
.wa-btn i{font-size:.85rem;}

/* ── MIC ── */
.mic-btn{width:34px;height:34px;border-radius:9px;flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--muted);}
.mic-btn:hover{background:rgba(217,119,6,.12);border-color:rgba(217,119,6,.3);color:var(--accent);}
.mic-btn.listening{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#ef4444;animation:micPulse 1s ease-in-out infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}

/* ── QUICK CHIPS ── */
.quick-chips{
  display:flex;gap:.4rem;
  padding:.5rem .9rem .15rem;
  flex-shrink:0;
  overflow-x:auto;flex-wrap:nowrap;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.quick-chips::-webkit-scrollbar{display:none;}
.chip{display:inline-flex;align-items:center;gap:.3rem;padding:.28rem .7rem;border-radius:999px;border:1px solid var(--border);background:transparent;font-size:.7rem;color:var(--muted);cursor:pointer;font-family:var(--font-b);transition:all .15s;white-space:nowrap;flex-shrink:0;}
.chip:hover{border-color:rgba(217,119,6,.35);color:var(--accent);background:rgba(217,119,6,.07);}

/* ── INPUT BAR ── */

}
.input-wrap{display:flex;align-items:flex-end;gap:.45rem;background:var(--input-bg);border:1px solid var(--border);border-radius:13px;padding:.6rem .7rem;transition:border-color .2s;}
.input-wrap:focus-within{border-color:rgba(217,119,6,.45);}
#userInput{flex:1;background:transparent;border:none;outline:none;color:var(--white);font-family:var(--font-b);resize:none;line-height:1.5;max-height:110px;scrollbar-width:none;font-size:16px !important;}
#userInput::placeholder{color:var(--muted);font-size:.82rem;}
#userInput::-webkit-scrollbar{display:none;}
.send-btn{width:34px;height:34px;border-radius:9px;flex-shrink:0;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s;}
.send-btn:hover{background:var(--accent-h);transform:scale(1.05);}

.send-btn:disabled{background:rgba(217,119,6,.25);cursor:not-allowed;transform:none;}
.input-hint{text-align:center;font-size:.68rem;color:rgba(134,163,142,.45);margin-top:.45rem;}

/* ── SCROLL BUTTON ── */
.scroll-btn{display:none;position:absolute;bottom:88px;right:14px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(217,119,6,.9);border:none;cursor:pointer;color:#fff;font-size:.75rem;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(217,119,6,.3);transition:opacity .2s;}
.scroll-btn.show{display:flex;}
.scroll-btn:hover{background:var(--accent-h);}

/* ══════════════════════════════════════════════════
   MOBILE RESPONSIVE — Complete overhaul
   ══════════════════════════════════════════════════ */
@media(max-width:768px){

  /* Layout */
  html,body{height:100dvh;height:-webkit-fill-available;overflow:hidden;}
  .app{
    grid-template-columns:1fr;
    height:100dvh;
    height:-webkit-fill-available;
    padding-top:var(--topbar-h);
    display:flex;
    flex-direction:column;

  /* Sidebar: hidden by default, slide in on open */
  .sidebar{display:none;}
  .sidebar.mob-open{
    display:flex;
    position:fixed;
    left:0;top:var(--topbar-h);bottom:0;
    width:min(280px,82vw);
    z-index:250;
    box-shadow:4px 0 24px rgba(0,0,0,.4);

  /* Mobile overlay behind sidebar */
  .mob-overlay{display:none;position:fixed;inset:0;top:var(--topbar-h);background:rgba(0,0,0,.55);z-index:240;}
  .mob-overlay.show{display:block;}

  /* Mobile header strip inside chat area */
  .mob-header{display:flex;}

  /* Chat area fills remaining height */
  .chat-area{
    flex:1;
    display:flex;flex-direction:column;
    overflow:hidden;
    position:relative;
    /* account for topbar */
    height:calc(100dvh - var(--topbar-h));
    height:calc(-webkit-fill-available - var(--topbar-h));
  }

  /* Welcome screen scrollable */
  .welcome-screen{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:1.25rem .85rem 1rem;
    justify-content:flex-start;
    padding-top:1.5rem;
  }

  .welcome-title{font-size:1.1rem;}
  .welcome-sub{font-size:.8rem;margin-bottom:1rem;}
  .welcome-icon{width:50px;height:50px;margin-bottom:.75rem;}
  .welcome-icon i{font-size:1.25rem;}

  /* Suggest grid: single column on mobile */
  .suggest-grid{
    grid-template-columns:1fr;
    max-width:100%;
    gap:.45rem;
  }
  .suggest-btn{
    padding:.65rem .8rem;
    border-radius:10px;
  }
  .suggest-btn span{font-size:.78rem;}

  /* Messages */
  .messages{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:.9rem .85rem;
    padding-bottom:.5rem;
  }
  .bubble{max-width:90%;}

  /* Quick chips: horizontal scroll, no wrap */
  .quick-chips{
    flex-wrap:nowrap;
    overflow-x:auto;
    padding:.45rem .85rem .1rem;
    flex-shrink:0;
  }

  /* Input bar */
  .input-bar{
    flex-shrink:0;
    padding:.65rem .85rem calc(.65rem + env(safe-area-inset-bottom));
  }
  .input-hint{display:none;}

  /* Hide status on mobile */
  .status-dot{display:none;}
  .export-btn{display:none;}

  /* Scroll btn higher on mobile */

}

  .top-bar{padding:0 .65rem;}

<script>
/* ══════════════════════════════════ MOBILE KEYBOARD FIX ══════════════════════════════════ */
(function(){
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',()=>{
      setTimeout(()=>{const m=document.getElementById('messages');if(m&&m.style.display!=='none')m.scrollTop=m.scrollHeight;},100);
    });
  }
  document.getElementById('userInput').addEventListener('focus',function(){
    setTimeout(()=>{const m=document.getElementById('messages');if(m&&m.style.display!=='none')m.scrollTop=m.scrollHeight;},350);
  });
})();

/* ══════════════════════════════════ CONFIG ══════════════════════════════════ */
const PROXY_URL   = 'api_proxy_gemini.php';
const WA_NUMBER   = '213XXXXXXXXX';
const MAX_MSGS    = 10;

/* ══════════════════════════════════ STATE ══════════════════════════════════ */
let chatStarted=false, isTyping=false, conversationHistory=[];
let waitingForSector=false, currentLang='de';
let msgsUsed = parseInt(localStorage.getItem('msgsUsed')||'0');
let lastMsgDate = localStorage.getItem('lastMsgDate')||'';
let isDark = true;
let recognition = null, isListening = false;
let lastBotKey = null;

/* ══════════════════════════════════ DAILY RESET ══════════════════════════════════ */
function checkDailyReset(){
  const today = new Date().toDateString();
  if(lastMsgDate !== today){ msgsUsed=0; localStorage.setItem('msgsUsed','0'); localStorage.setItem('lastMsgDate',today); lastMsgDate=today; }
  updateMsgsCounter();
}
function updateMsgsCounter(){
  const left = MAX_MSGS - msgsUsed;
  const pct  = Math.max(0,(left/MAX_MSGS)*100);
  const labels={de:`${left} / ${MAX_MSGS} Fragen heute`,en:`${left} / ${MAX_MSGS} questions today`,ar:`${left} / ${MAX_MSGS} أسئلة اليوم`};
  const el=document.getElementById('msgsLeftText');
  const fill=document.getElementById('msgsLeftFill');
  if(el) el.textContent=labels[currentLang];
  if(fill) fill.style.width=pct+'%';
}
checkDailyReset();

/* ══════════════════════════════════ STATUS ══════════════════════════════════ */
function setStatus(state){
  const ball=document.getElementById('statusBall');
  const lbl=document.getElementById('statusLabel');
  if(!ball)return;
  ball.className='dot'+(state==='slow'?' slow':state==='offline'?' offline':'');
  const labels={online:{de:'Online',en:'Online',ar:'متصل'},slow:{de:'Langsam',en:'Slow',ar:'بطيء'},offline:{de:'Offline',en:'Offline',ar:'غير متصل'}};
  if(lbl) lbl.textContent=labels[state][currentLang];
}
setStatus('online');

/* ══════════════════════════════════ THEME ══════════════════════════════════ */
function toggleTheme(){
  isDark=!isDark;
  /* Smooth transition flash */
  document.body.style.transition='background .35s ease,color .35s ease';
  document.body.classList.toggle('light-mode',!isDark);
  const icon=document.getElementById('themeIcon');
  const btn=document.getElementById('themeBtn');
  icon.className=isDark?'fa-solid fa-moon':'fa-solid fa-sun';
  btn.title=isDark?'Hell-Modus':'Dunkel-Modus';
  /* Animate icon */
  icon.style.transform='scale(0) rotate(90deg)';
  icon.style.transition='transform .22s ease';
  setTimeout(()=>{icon.style.transform='scale(1) rotate(0deg)';},50);
  localStorage.setItem('chatTheme',isDark?'dark':'light');
  showToast(isDark?'🌙 Dunkel-Modus aktiv':'☀️ Hell-Modus aktiv','info');
}
(function(){
  const saved=localStorage.getItem('chatTheme');
  if(saved==='light'){
    isDark=false;
    document.body.classList.add('light-mode');
    document.getElementById('themeIcon').className='fa-solid fa-sun';
    document.getElementById('themeBtn').title='Dunkel-Modus';
  }
})();

/* ══════════════════════════════════ EXPORT ══════════════════════════════════ */
function exportChat(){
  const msgs=document.querySelectorAll('#messages .msg-row');
  if(!msgs.length){alert('Kein Chat zum Exportieren.');return;}
  let txt=`3E Consulting — Chatbot Export\n${new Date().toLocaleString()}\n${'─'.repeat(40)}\n\n`;
  msgs.forEach(row=>{
    const isUser=row.classList.contains('user');
    const role=isUser?'SIE':'BOT';
    const bub=row.querySelector('.bubble');
    if(bub) txt+=`[${role}]\n${bub.innerText.trim()}\n\n`;
  });
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`3e-chat-${Date.now()}.txt`;
  a.click();
}

/* ══════════════════════════════════ VOICE ══════════════════════════════════ */
function toggleVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    const msg={de:'Spracheingabe wird in diesem Browser nicht unterstützt.',en:'Voice input not supported in this browser.',ar:'إدخال الصوت غير مدعوم في هذا المتصفح.'};
    showToast(msg[currentLang],'warn'); return;
  }
  if(isListening){ recognition&&recognition.stop(); return; }
  recognition=new SpeechRecognition();
  recognition.lang=currentLang==='de'?'de-DE':currentLang==='ar'?'ar-DZ':'en-US';
  recognition.interimResults=false; recognition.maxAlternatives=1;
  isListening=true;
  document.getElementById('micBtn').classList.add('listening');
  recognition.start();
  recognition.onresult=e=>{
    const transcript=e.results[0][0].transcript;
    document.getElementById('userInput').value=transcript;
    autoResize(document.getElementById('userInput'));
  };
  recognition.onend=()=>{ isListening=false; document.getElementById('micBtn').classList.remove('listening'); };
  recognition.onerror=()=>{ isListening=false; document.getElementById('micBtn').classList.remove('listening'); };
}

function detectSectorFromText(text){
  const t=text.toLowerCase();
  const map={pflege:['pflege','krankenpflege','altenpflege','nurse','nursing','تمريض','رعاية'],handwerk:['handwerk','elektriker','klempner','craft','trade','حرفة','كهربائي'],gastronomie:['gastro','restaurant','hotel','küche','ضيافة','فندق'],logistik:['logistik','transport','lkw','fahrer','لوجستيك','نقل'],it:['it','informatik','software','تقنية'],medizin_arzt:['arzt','zahnarzt','doctor','طبيب'],architektur:['architekt','هندسة معمارية'],buchhaltung:['buchhalter','accountant','محاسبة']};
  for(const[k,w]of Object.entries(map)){if(w.some(x=>t.includes(x)))return k;}
  return null;
}
function handleJobSectorResponse(key){
  waitingForSector=false;
  const s=SECTORS[key];
  if(!s){addMessage('bot',{de:`<p>Nicht verfügbar.</p>`,en:`<p>Not available.</p>`,ar:`<p>غير متاح.</p>`}[currentLang]);return;}
  if(!s.available){addMessage('bot',{de:`<p><strong>${s.label.de}</strong> derzeit nicht verfügbar. Verfügbar: Pflege · Handwerk · Gastronomie · Logistik</p>`,en:`<p>Not available.</p>`,ar:`<p>غير متاح.</p>`}[currentLang]);return;}
  addMessage('bot',s.conditions[currentLang],s.pages,'ausbildung');
}
function askForSector(){
  waitingForSector=true;
  const list=Object.entries(SECTORS).map(([k,s])=>`<button class="sector-btn" onclick="pickSector('${k}')">${s.icon} ${s.label[currentLang]}</button>`).join('');
  addMessage('bot',{de:`<p>In welchem <strong>Berufsfeld</strong>?</p><div class="sector-btns">${list}</div>`,en:`<p>Which <strong>field</strong>?</p><div class="sector-btns">${list}</div>`,ar:`<p>أي <strong>مجال</strong>؟</p><div class="sector-btns">${list}</div>`}[currentLang]);
}
function pickSector(k){const s=SECTORS[k];if(!s)return;addMessage('user',`<p>${s.icon} ${s.label[currentLang]}</p>`);handleJobSectorResponse(k);}

function addFollowUps(key){
  const list=FOLLOWUPS[key]||FOLLOWUPS.default;
  const wrap=document.createElement('div');
  wrap.className='followup-wrap';
  list.forEach(q=>{
    const btn=document.createElement('button');
    btn.className='followup-btn';
    btn.innerHTML=`<i class="fa-solid fa-arrow-right"></i>${q}`;
    btn.onclick=()=>{document.getElementById('userInput').value=q;sendMessage();wrap.remove();};

function addRating(msgRow){
  const bubble=msgRow.querySelector('.bubble');
  if(!bubble)return;
  const id='r'+Date.now();
  const labels={de:'War das hilfreich?',en:'Was this helpful?',ar:'هل كان هذا مفيداً؟'};
  const wrap=document.createElement('div');
  wrap.className='rating-widget';
  wrap.id=id;
  wrap.innerHTML=`<span class="rating-q">${labels[currentLang]}</span><div class="rating-btns"><button class="rating-btn pos" onclick="rateMsg('${id}',true,this)" title="Ja">👍</button><button class="rating-btn neg" onclick="rateMsg('${id}',false,this)" title="Nein">👎</button></div>`;
  bubble.appendChild(wrap);
}
function rateMsg(id,positive,btn){
  const wrap=document.getElementById(id);
  if(!wrap)return;
  wrap.querySelectorAll('.rating-btn').forEach(b=>{b.disabled=true;});
  btn.classList.add('chosen');
  if(!positive){
    setTimeout(()=>{
      const bubble=wrap.closest('.bubble');
      if(bubble&&!bubble.querySelector('.wa-card')){
        const tmp=document.createElement('div');tmp.innerHTML=buildWACard();bubble.appendChild(tmp.firstElementChild);
      }
    },300);
  }
  setTimeout(()=>{ wrap.innerHTML=`<span class="rating-done">${positive?'✓ Danke!':'👍 Wir verbessern uns!'}</span>`; },600);
}

const KEYWORDS={cv:['lebenslauf','cv','resume','سيرة'],motivation:['motivat','anschreiben','letter','رسالة'],docs:['dokument','unterlag','وثيق','zeugnis'],ausbildung:['ausbildung','apprenti','تدريب','voraussetz'],job:['job','stelle','arbeit','work','عمل','وظيفة'],interview:['interview','gespräch','مقابلة'],video:['video','فيديو'],visum:['visum','visa','تأشيرة'],kosten:['kost','preis','price','cost','تكلف'],chancen:['chance','فرص'],sperrkonto:['sperrkonto','blocked','حساب مقيد'],schritte:['erste','ankunft','خطوات','bank','kranken'],register:['registrierung','register','konto','account','حساب'],kontakt:['kontakt','contact','support','تواصل']};
function detectTopic(text){const t=text.toLowerCase();for(const[k,w]of Object.entries(KEYWORDS)){if(w.some(x=>t.includes(x)))return k;}return null;}

const SYSTEM_PROMPT=`You are the official AI assistant of 3E-Consulting, connecting Algerian candidates with German employers.
RULES: Short, clear, professional answers. Max 150 words. Use HTML: <p>, <strong>, <br>, <a href="...">label</a>. Detect language → reply in SAME language.
SECTORS: Pflege (B2), Handwerk (B1), Gastronomie (B1), Logistik (B1). NOT available: IT, Arzt, Architektur, Buchhaltung.
PRICING: Registration FREE | CV 4,500 DA | Motivation 7,500 DA | Interview 12,000 DA.
Context: Remember what the user said earlier in this conversation to give relevant answers.`;

/* ══════════════════════════════════ UI HELPERS ══════════════════════════════════ */
function startChat(){if(!chatStarted){chatStarted=true;document.getElementById('welcomeScreen').style.display='none';document.getElementById('messages').style.display='flex';}}

function addMessage(role,html,links,topicKey){
  startChat();
  const msgs=document.getElementById('messages');
  const isBot=role==='bot';
  const row=document.createElement('div');
  row.className=`msg-row ${role}`;
  const av=`<div class="avatar ${role}">${isBot?'<i class="fa-solid fa-robot" style="font-size:.72rem"></i>':'<i class="fa-solid fa-user" style="font-size:.72rem"></i>'}</div>`;
  let linksHtml='';
  if(links&&links.length) linksHtml=`<div class="link-btns">${links.map(l=>`<a class="link-btn" href="${l.url}"><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:.62rem"></i>${l.label}</a>`).join('')}</div>`;
  const bubble=`<div class="bubble ${role}">${html}${linksHtml}</div>`;
  row.innerHTML=isBot?av+bubble:bubble+av;
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
  if(isBot){
    setTimeout(()=>{addRating(row);},400);
    if(topicKey) setTimeout(()=>{addFollowUps(topicKey);},500);
  }
  return row;
}

function showTyping(){startChat();const msgs=document.getElementById('messages');const row=document.createElement('div');row.className='msg-row bot';row.id='typingRow';row.innerHTML=`<div class="avatar bot"><i class="fa-solid fa-robot" style="font-size:.72rem"></i></div><div class="bubble bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;}
function removeTyping(){const el=document.getElementById('typingRow');if(el)el.remove();}

function showToast(msg,type='info'){
  let t=document.getElementById('chatToast');
  if(!t){t=document.createElement('div');t.id='chatToast';t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:20px;font-size:.76rem;font-weight:600;z-index:500;transition:opacity .3s;white-space:nowrap;';document.body.appendChild(t);}
  t.textContent=msg;
  t.style.background=type==='warn'?'rgba(245,158,11,.9)':'rgba(74,222,128,.9)';
  t.style.color='#fff';t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2500);
}

/* ══════════════════════════════════ SEND LOGIC ══════════════════════════════════ */
function askTopic(key){
  const q=SUGGESTS[currentLang].find(s=>s.key===key);
  const label=q?q.text:(TOPICS[currentLang].find(t=>t.key===key)?.label||key);
  addMessage('user',`<p>${label}</p>`);
  if(key==='job'){askForSector();closeSidebar();return;}
  respond(key,label);closeSidebar();
}
function sendChip(text){document.getElementById('userInput').value=text;sendMessage();}
function sendMessage(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();
  if(!text||isTyping)return;
  if(msgsUsed>=MAX_MSGS){
    const lim={de:`<p>Sie haben heute Ihr Limit von ${MAX_MSGS} Fragen erreicht. Schreiben Sie uns direkt!</p>${buildWACard()}`,en:`<p>You've reached today's limit of ${MAX_MSGS} questions. Contact us directly!</p>${buildWACard()}`,ar:`<p>وصلت إلى حد ${MAX_MSGS} سؤال اليوم. راسلنا مباشرة!</p>${buildWACard()}`};
    addMessage('bot',lim[currentLang]);return;
  }
  input.value='';input.style.height='auto';
  addMessage('user',`<p>${escapeHtml(text)}</p>`);
  msgsUsed++;localStorage.setItem('msgsUsed',msgsUsed);updateMsgsCounter();
  if(waitingForSector){
    const sk=detectSectorFromText(text);
    if(sk){handleJobSectorResponse(sk);return;}
    addMessage('bot',{de:`<p>Bitte wählen Sie einen Sektor.</p>`,en:`<p>Please pick a field.</p>`,ar:`<p>الرجاء اختيار المجال.</p>`}[currentLang]);
    askForSector();return;
  }
  const topic=detectTopic(text);
  if(topic==='job'){askForSector();return;}
  respond(topic,text);
}

async function respond(key,userText){
  if(isTyping)return;
  isTyping=true;
  document.getElementById('sendBtn').disabled=true;
  showTyping();
  const msgText=userText||(TOPICS[currentLang].find(t=>t.key===key)?.label)||key||'Hello';
  conversationHistory.push({role:'user',content:msgText});
  const t0=Date.now();
  try{
    const res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:SYSTEM_PROMPT,messages:conversationHistory})});
    const elapsed=Date.now()-t0;
    if(elapsed>4000)setStatus('slow'); else setStatus('online');
    const data=await res.json();
    removeTyping();
    if(data.content&&data.content[0]&&data.content[0].text){
      const aiText=data.content[0].text;
      conversationHistory.push({role:'assistant',content:aiText});
      const staticLinks=(key&&RESPONSES[key])?RESPONSES[key][currentLang]?.links:null;
      const row=addMessage('bot',aiText,staticLinks,key||'default');
      lastBotKey=key;
      const txt=aiText.toLowerCase();
      const unknownSigs=['leider','nicht beantworten','außerhalb','no answer','can\'t help','لا أعرف','لا أستطيع','لا أملك','don\'t know','not sure','beyond','outside'];
      if(unknownSigs.some(s=>txt.includes(s))){
        setTimeout(()=>{
          const bub=row.querySelector('.bubble');
          if(bub&&!bub.querySelector('.wa-card')){
            const d=document.createElement('div');d.innerHTML=buildWACard();bub.appendChild(d.firstElementChild);
          }
        },300);
      }
    } else throw new Error('no content');
  }catch(err){
    setStatus('offline');setTimeout(()=>setStatus('online'),5000);
    removeTyping();
    const resp=key&&RESPONSES[key]?RESPONSES[key][currentLang]:null;
    if(resp){addMessage('bot',resp.text,resp.links,key);}
    else{const fallHtml=FALLBACK[currentLang]+buildWACard();addMessage('bot',fallHtml,null,'default');}
  }
  isTyping=false;
  document.getElementById('sendBtn').disabled=false;
}

/* ══════════════════════════════════ UI FUNCTIONS ══════════════════════════════════ */
function renderSidebar(){document.getElementById('topicList').innerHTML=TOPICS[currentLang].map(t=>`<div class="topic-item" onclick="askTopic('${t.key}')"><div class="topic-icon"><i class="fa-solid ${t.icon}"></i></div><span class="topic-label">${t.label}</span></div>`).join('');}
function renderSuggests(){document.getElementById('suggestGrid').innerHTML=SUGGESTS[currentLang].map(s=>`<button class="suggest-btn" onclick="askTopic('${s.key}')"><i class="fa-solid ${s.icon}"></i><span>${s.text}</span></button>`).join('');}
function renderChips(){document.getElementById('quickChips').innerHTML=CHIPS[currentLang].map(c=>`<button class="chip" onclick="sendChip('${c}')">${c}</button>`).join('');}
function applyLangUI(){
  const L=LANGS[currentLang];
  document.getElementById('backLabel').textContent=L.back;
  document.getElementById('newChatLabel').textContent=L.newChat;
  document.getElementById('sideTitle').textContent=L.sideTitle;
  document.getElementById('sideQuickLabel').textContent=L.sideQuickLabel;
  document.getElementById('mobTitle').textContent=L.mobTitle;
  document.getElementById('welcomeTitle').innerHTML=L.welcomeTitle;
  document.getElementById('welcomeSub').textContent=L.welcomeSub;
  document.getElementById('userInput').placeholder=L.placeholder;
  document.getElementById('inputHint').textContent=L.inputHint;
  document.body.style.direction=currentLang==='ar'?'rtl':'ltr';
  updateMsgsCounter();
}
function resetChat(){chatStarted=false;conversationHistory=[];waitingForSector=false;document.getElementById('welcomeScreen').style.display='flex';document.getElementById('messages').style.display='none';document.getElementById('messages').innerHTML='';document.getElementById('userInput').value='';closeSidebar();lastBotKey=null;}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* Lang */
const LANG_META={de:{flag:'🇩🇪',code:'DE'},en:{flag:'🇬🇧',code:'EN'},ar:{flag:'🇩🇿',code:'AR'}};
function toggleLangMenu(){const dd=document.getElementById('langDropdown');const open=dd.classList.toggle('open');document.getElementById('langTrigger').setAttribute('aria-expanded',open);}
function selectLang(lang){
  const dd=document.getElementById('langDropdown');
  dd.classList.remove('open');
  document.getElementById('langTrigger').setAttribute('aria-expanded','false');
  document.getElementById('langFlag').textContent=LANG_META[lang].flag;
  document.getElementById('langCode').textContent=LANG_META[lang].code;
  ['de','en','ar'].forEach(l=>document.getElementById('opt-'+l).classList.toggle('active',l===lang));
  setLang(lang);
}
document.addEventListener('click',function(e){const dd=document.getElementById('langDropdown');if(dd&&!dd.contains(e.target))dd.classList.remove('open');});
function setLang(lang){currentLang=lang;applyLangUI();renderSidebar();renderSuggests();renderChips();}
function toggleSidebar(){const s=document.getElementById('sidebar'),o=document.getElementById('mobOverlay'),open=s.classList.toggle('mob-open');o.classList.toggle('show',open);}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mob-open');document.getElementById('mobOverlay').classList.remove('show');}

setLang('de');
</script>
