<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3E Consulting — Bewerber Assistent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2017;
  --navy2:#0a1a0f;
  --accent:#d97706;
  --accent-h:#b45309;
  --bright:#4ade80;
  --white:#fff;
  --muted:#86a38e;
  --border:rgba(74,222,128,.15);
  --glass:rgba(255,255,255,.04);
  --chat-bg:#0d1f13;
  --user-bubble:#d97706;
  --bot-bubble:rgba(255,255,255,.06);
  --input-bg:rgba(255,255,255,.05);
  --font-d:'Syne',sans-serif;
  --font-b:'DM Sans',sans-serif;
}
html,body{height:100%;font-family:var(--font-b);background:var(--navy);color:var(--white);overflow:hidden}

/* ── NAV ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:60px;display:flex;align-items:center;justify-content:space-between;
  padding:0 1.25rem;
  background:rgba(15,32,23,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.top-brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.top-brand img{height:32px;width:32px;border-radius:7px;object-fit:cover;}
.top-brand span{font-family:var(--font-d);font-size:.95rem;font-weight:800;color:#fff;letter-spacing:.04em;}
.top-back{
  display:inline-flex;align-items:center;gap:.4rem;
  font-size:.8rem;color:var(--muted);text-decoration:none;
  padding:.4rem .85rem;border-radius:8px;border:1px solid var(--border);
  transition:all .2s;
}
.top-back:hover{color:var(--white);border-color:rgba(74,222,128,.3);}

/* lang selector */
.lang-sel{display:flex;gap:.3rem;}
.lang-btn{
  font-size:.72rem;font-weight:600;padding:.3rem .6rem;
  border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  transition:all .15s;font-family:var(--font-b);
}
.lang-btn:hover,.lang-btn.active{background:rgba(217,119,6,.15);color:var(--accent);border-color:rgba(217,119,6,.35);}

/* ── LAYOUT ── */
.app{
  display:grid;
  grid-template-columns:280px 1fr;
  height:100vh;
  padding-top:60px;
}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--navy2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-header{
  padding:1.25rem 1rem .75rem;
  border-bottom:1px solid var(--border);
}
.sidebar-title{font-family:var(--font-d);font-size:.78rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.85rem;}
.new-chat-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.65rem;border-radius:10px;
  background:var(--accent);color:var(--white);
  border:none;cursor:pointer;font-size:.85rem;font-weight:600;font-family:var(--font-b);
  transition:background .2s,transform .15s;
}
.new-chat-btn:hover{background:var(--accent-h);transform:translateY(-1px);}

.sidebar-section{padding:.75rem 1rem .25rem;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}

.topic-list{padding:0 .5rem;flex:1;overflow-y:auto;}
.topic-item{
  display:flex;align-items:center;gap:.65rem;
  padding:.6rem .75rem;border-radius:9px;
  cursor:pointer;transition:background .15s;
  margin-bottom:.2rem;
}
.topic-item:hover,.topic-item.active{background:var(--glass);}
.topic-item.active{border-left:2px solid var(--accent);}
.topic-icon{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(217,119,6,.12);
}
.topic-icon i{color:var(--accent);font-size:.8rem;}
.topic-label{font-size:.82rem;color:var(--muted);line-height:1.3;}
.topic-item.active .topic-label,.topic-item:hover .topic-label{color:var(--white);}

/* ── CHAT AREA ── */
.chat-area{
  display:flex;flex-direction:column;
  background:var(--chat-bg);
  overflow:hidden;position:relative;
}

/* Welcome screen */
.welcome-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem 1.5rem;
  text-align:center;
  overflow-y:auto;
}
.welcome-icon{
  width:64px;height:64px;border-radius:18px;
  background:rgba(217,119,6,.15);border:1px solid rgba(217,119,6,.3);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.25rem;
}
.welcome-icon i{color:var(--accent);font-size:1.6rem;}
.welcome-title{font-family:var(--font-d);font-size:1.5rem;font-weight:800;margin-bottom:.5rem;}
.welcome-title em{font-style:normal;color:var(--accent);}
.welcome-sub{font-size:.9rem;color:var(--muted);line-height:1.6;max-width:400px;margin:0 auto 2rem;}

/* Suggested questions */
.suggest-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:.65rem;width:100%;max-width:560px;margin:0 auto;
}
.suggest-btn{
  display:flex;align-items:flex-start;gap:.6rem;
  padding:.8rem .9rem;border-radius:12px;
  border:1px solid var(--border);background:var(--glass);
  cursor:pointer;text-align:left;
  transition:border-color .2s,background .2s,transform .15s;
  font-family:var(--font-b);
}
.suggest-btn:hover{border-color:rgba(217,119,6,.4);background:rgba(217,119,6,.07);transform:translateY(-1px);}
.suggest-btn i{color:var(--accent);font-size:.85rem;margin-top:.1rem;flex-shrink:0;}
.suggest-btn span{font-size:.79rem;color:var(--muted);line-height:1.45;}
.suggest-btn:hover span{color:var(--white);}

/* Chat messages */
.messages{
  flex:1;overflow-y:auto;
  padding:1.5rem 1.25rem;
  display:flex;flex-direction:column;
  gap:1.25rem;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-track{background:transparent;}
.messages::-webkit-scrollbar-thumb{background:rgba(74,222,128,.15);border-radius:2px;}

.msg-row{display:flex;align-items:flex-start;gap:.75rem;}
.msg-row.user{flex-direction:row-reverse;}

.avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;
}
.avatar.bot{background:rgba(217,119,6,.2);border:1px solid rgba(217,119,6,.3);color:var(--accent);}
.avatar.user{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.25);color:var(--bright);}

.bubble{
  max-width:72%;padding:.85rem 1.1rem;border-radius:14px;
  font-size:.875rem;line-height:1.65;
}
.bubble.bot{
  background:var(--bot-bubble);border:1px solid var(--border);
  border-top-left-radius:4px;color:var(--white);
}
.bubble.user{
  background:var(--user-bubble);color:var(--white);
  border-top-right-radius:4px;
}
.bubble p{margin-bottom:.55rem;}
.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:var(--bright);font-weight:600;}

/* Link buttons in bot messages */
.link-btns{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem;}
.link-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.45rem .9rem;border-radius:8px;
  background:rgba(217,119,6,.15);border:1px solid rgba(217,119,6,.35);
  color:var(--accent);font-size:.77rem;font-weight:600;
  text-decoration:none;cursor:pointer;
  transition:background .2s,transform .15s;font-family:var(--font-b);
}
.link-btn:hover{background:rgba(217,119,6,.28);transform:translateY(-1px);}

/* Typing indicator */
.typing-dots{display:flex;gap:4px;align-items:center;padding:.2rem 0;}
.typing-dots span{
  width:7px;height:7px;border-radius:50%;
  background:var(--muted);
  animation:bounce 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── INPUT BAR ── */
.input-bar{
  padding:.85rem 1.25rem 1rem;
  border-top:1px solid var(--border);
  background:rgba(13,31,19,.95);
}
.input-wrap{
  display:flex;align-items:flex-end;gap:.65rem;
  background:var(--input-bg);border:1px solid var(--border);
  border-radius:14px;padding:.65rem .75rem;
  transition:border-color .2s;
}
.input-wrap:focus-within{border-color:rgba(217,119,6,.45);}
#userInput{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--white);font-size:.9rem;font-family:var(--font-b);
  resize:none;line-height:1.5;max-height:120px;
  scrollbar-width:none;
}
#userInput::placeholder{color:var(--muted);}
#userInput::-webkit-scrollbar{display:none;}
.send-btn{
  width:36px;height:36px;border-radius:9px;flex-shrink:0;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s;
}
.send-btn:hover{background:var(--accent-h);transform:scale(1.05);}
.send-btn i{color:#fff;font-size:.9rem;}
.send-btn:disabled{background:rgba(217,119,6,.25);cursor:not-allowed;transform:none;}

.input-hint{text-align:center;font-size:.72rem;color:rgba(134,163,142,.5);margin-top:.5rem;}

/* Quick suggestions under input */
.quick-chips{
  display:flex;gap:.45rem;flex-wrap:wrap;
  padding:.6rem 1.25rem .2rem;
}
.chip{
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.3rem .75rem;border-radius:999px;
  border:1px solid var(--border);background:transparent;
  font-size:.72rem;color:var(--muted);cursor:pointer;
  font-family:var(--font-b);transition:all .15s;
}
.chip:hover{border-color:rgba(217,119,6,.35);color:var(--accent);background:rgba(217,119,6,.07);}

/* ── MOBILE ── */
.mob-header{display:none;}
@media(max-width:768px){
  html,body{overflow:auto;}
  .app{grid-template-columns:1fr;height:auto;min-height:100vh;}
  .sidebar{display:none;}
  .mob-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:.6rem 1rem;border-bottom:1px solid var(--border);
    background:rgba(13,31,19,.95);
  }
  .mob-title{font-family:var(--font-d);font-size:.85rem;font-weight:700;}
  .mob-sidebar-btn{
    width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
    background:transparent;color:var(--muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .chat-area{height:calc(100vh - 60px);}
  .suggest-grid{grid-template-columns:1fr;}
  .bubble{max-width:88%;}

  /* Mobile sidebar overlay */
  .sidebar.mob-open{
    display:flex;position:fixed;left:0;top:60px;bottom:0;
    width:280px;z-index:200;
  }
  .mob-overlay{
    display:none;position:fixed;inset:0;top:60px;
    background:rgba(0,0,0,.5);z-index:199;
  }
  .mob-overlay.show{display:block;}
}
@media(max-width:480px){
  .welcome-title{font-size:1.2rem;}
  .suggest-grid{gap:.5rem;}
  .top-bar{padding:0 .85rem;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">

function detectTopic(text) {
  const t = text.toLowerCase();
  for(const [key, words] of Object.entries(KEYWORDS)){
    if(words.some(w => t.includes(w))) return key;
  }
  return null;
}

  const list = document.getElementById('topicList');
  list.innerHTML = TOPICS[currentLang].map((t,i) => `
    <div class="topic-item" onclick="askTopic('${t.key}')">
      <div class="topic-icon"><i class="fa-solid ${t.icon}"></i></div>

}

  document.getElementById('userInput').placeholder = L.placeholder;
  document.getElementById('inputHint').textContent = L.inputHint;
  // RTL for Arabic
  document.body.style.direction = currentLang === 'ar' ? 'rtl' : 'ltr';
}

/* ═══════════════════════════════════════════
   CHAT LOGIC
═══════════════════════════════════════════ */
function startChat(){
  if(!chatStarted){
    chatStarted = true;
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
  }
}

function addMessage(role, html, links){
  startChat();
  const msgs = document.getElementById('messages');
  const isBot = role === 'bot';
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const av = `<div class="avatar ${role}">${isBot ? '<i class="fa-solid fa-robot" style="font-size:.75rem"></i>' : '<i class="fa-solid fa-user" style="font-size:.75rem"></i>'}</div>`;

  let linksHtml = '';
  if(links && links.length){
    linksHtml = `<div class="link-btns">${links.map(l =>
      `<a class="link-btn" href="${l.url}"><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:.65rem"></i>${l.label}</a>`
    ).join('')}</div>`;
  }

  const bubble = `<div class="bubble ${role}">${html}${linksHtml}</div>`;
  row.innerHTML = isBot ? av + bubble : bubble + av;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row;
}

function showTyping(){
  startChat();
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typingRow';
  row.innerHTML = `
    <div class="avatar bot"><i class="fa-solid fa-robot" style="font-size:.75rem"></i></div>
    <div class="bubble bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>
  `;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping(){
  const el = document.getElementById('typingRow');
  if(el) el.remove();
}

function askTopic(key){
  const q = SUGGESTS[currentLang].find(s => s.key === key);
  const label = q ? q.text : (TOPICS[currentLang].find(t => t.key === key)?.label || key);
  addMessage('user', `<p>${label}</p>`);
  respond(key);
  closeSidebar();
}

function sendChip(text){
  document.getElementById('userInput').value = text;
  sendMessage();
}

function sendMessage(){
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text || isTyping) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', `<p>${escapeHtml(text)}</p>`);
  const topic = detectTopic(text);
  respond(topic);
}

/* ═══════════════════════════════════════════
   CONVERSATION HISTORY (for multi-turn context)
═══════════════════════════════════════════ */
let conversationHistory = [];

/* ═══════════════════════════════════════════
   SYSTEM PROMPT (3E Consulting knowledge base)
═══════════════════════════════════════════ */
const SYSTEM_PROMPT = `
Du bist der offizielle KI-Assistent von 3E-Consulting.

ÜBER 3E-CONSULTING:
3E-Consulting ist eine Plattform, die den Bewerbungsprozess für algerische Bewerber erleichtert.

PREISE:
- Registrierung: kostenlos
- Lebenslauf: 4.500 DA
- Motivationsschreiben: 7.500 DA
- Interview-Vorbereitung: 12.000 DA

ERSTE SCHRITTE IN DEUTSCHLAND:
- Anmeldung beim Einwohnermeldeamt
- Krankenversicherung
- Bankkonto eröffnen
- SIM-Karte kaufen
- Haftpflichtversicherung

REGISTRIERUNG:
1. Registrieren
2. Daten eingeben
3. Dokumente hochladen
4. Profilvideo aufnehmen
5. Profil absenden

FAQ:

Frage: Was ist 3E-Consulting?
Antwort:
3E-Consulting ist eine Plattform, die den Bewerbungsprozess für algerische Bewerber erleichtert.

Frage: Wie kann ich mich registrieren?
Antwort:
Klicken Sie auf „Registrieren“, füllen Sie das Formular aus und laden Sie Ihre Dokumente hoch.

Frage: Muss ich bezahlen?
Antwort:
Nein. Die Registrierung ist kostenlos.

Frage: Wie viel kostet ein Lebenslauf?
Antwort:
4.500 DA.

Frage: Wie viel kostet ein Motivationsschreiben?
Antwort:
7.500 DA.

Frage: Wie viel kostet die Vorbereitung auf ein Vorstellungsgespräch?
Antwort:
12.000 DA.

Antwortstil:
- Freundlich
- Professionell
- HTML verwenden (<p>, <strong>, <br>)
`;

async function respond(key){
  if(isTyping) return;
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  // Get the last user message from the DOM to send to AI
  const msgs = document.getElementById('messages');
  const userBubbles = msgs.querySelectorAll('.bubble.user p');
  const lastUserMsg = userBubbles.length > 0 ? userBubbles[userBubbles.length - 1].textContent : key;

  // If it's a topic click (key without free text), use a descriptive question
  const userText = lastUserMsg || key;

  // Add to conversation history
  conversationHistory.push({ role: 'user', content: userText });

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    if(data.content && data.content[0] && data.content[0].text){
      const aiText = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: aiText });

      // Check if the static response has links to append
      const staticResp = key && RESPONSES[key] ? RESPONSES[key][currentLang] : null;
      const links = staticResp ? staticResp.links : null;

      addMessage('bot', aiText, links);
    } else {
      addMessage('bot', FALLBACK[currentLang]);
    }
  } catch(err) {
    removeTyping();
    // Fallback to static responses if API fails
    const resp = key && RESPONSES[key] ? RESPONSES[key][currentLang] : null;
    if(resp){
      addMessage('bot', resp.text, resp.links);
    } else {
      addMessage('bot', FALLBACK[currentLang]);
    }
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

function resetChat(){
  chatStarted = false;
  conversationHistory = [];
  document.getElementById('welcomeScreen').style.display = 'flex';
  document.getElementById('messages').style.display = 'none';
  document.getElementById('messages').innerHTML = '';
  document.getElementById('userInput').value = '';
  closeSidebar();
}

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escapeHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══════════════════════════════════════════
   LANG
═══════════════════════════════════════════ */
function setLang(lang){
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
  applyLangUI();
  renderSidebar();
  renderSuggests();
  renderChips();
}

/* ═══════════════════════════════════════════
   MOBILE SIDEBAR
═══════════════════════════════════════════ */
function toggleSidebar(){
  const s = document.getElementById('sidebar');
  const o = document.getElementById('mobOverlay');
  const open = s.classList.toggle('mob-open');
  o.classList.toggle('show', open);
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('mobOverlay').classList.remove('show');
}

setLang('de');
